<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a33;
      --line: rgba(255, 255, 255, 0.16);
      --text: #f5f7ff;
      --muted: #9aa4cb;
      --accent: #6ee7f9;
      --accent-2: #ff8a5b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(110, 231, 249, 0.12), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 138, 91, 0.12), transparent 30%),
        linear-gradient(180deg, #0c1226 0%, #070b16 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .game-shell {
      position: relative;
      width: min(92vw, 900px);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19, 26, 51, 0.96), rgba(11, 16, 32, 0.96));
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(1.5rem, 2vw, 2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .scoreboard {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      font-weight: 700;
    }

    .scoreboard span:first-child {
      color: var(--accent);
    }

    .scoreboard span:last-child {
      color: var(--accent-2);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #09101d, #03060d);
    }

    .footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .menu-overlay {
      position: absolute;
      inset: 92px 24px 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(7, 11, 22, 0.5), rgba(7, 11, 22, 0.78)),
        radial-gradient(circle at top, rgba(110, 231, 249, 0.08), transparent 42%),
        radial-gradient(circle at bottom, rgba(255, 138, 91, 0.08), transparent 34%);
      backdrop-filter: blur(8px);
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    .menu-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-card {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19, 26, 51, 0.95), rgba(8, 12, 24, 0.96));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    .menu-kicker {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .menu-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .menu-copy {
      margin: 12px 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .menu-controls {
      display: grid;
      gap: 14px;
    }

    .menu-label {
      margin: 0;
      text-align: left;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .difficulty-select,
    .target-select,
    .play-button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      font: inherit;
    }

    .difficulty-select,
    .target-select {
      padding: 14px 16px;
      background:
        linear-gradient(135deg, rgba(110, 231, 249, 0.16), rgba(137, 255, 242, 0.08)),
        rgba(7, 16, 26, 0.96);
      color: #f8fcff;
      outline: none;
      appearance: none;
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 12px 28px rgba(110, 231, 249, 0.08);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .difficulty-select:hover,
    .difficulty-select:focus-visible,
    .target-select:hover,
    .target-select:focus-visible {
      border-color: rgba(110, 231, 249, 0.38);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 16px 32px rgba(110, 231, 249, 0.12);
      transform: translateY(-1px);
    }

    .difficulty-select option,
    .target-select option {
      background: #0c1424;
      color: #f8fcff;
    }

    .play-button {
      padding: 15px 18px;
      background: linear-gradient(135deg, var(--accent), #89fff2);
      color: #04101a;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      box-shadow: 0 18px 36px rgba(110, 231, 249, 0.22);
    }

    .play-button:hover,
    .play-button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 20px 42px rgba(110, 231, 249, 0.28);
      outline: none;
    }

    .difficulty-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <h1 class="title">Pong</h1>
        <div class="meta">
          <span>Move with mouse or Arrow / W S keys</span>
          <span>Ball accelerates after every paddle hit</span>
        </div>
      </div>
      <div class="scoreboard" aria-label="Score">
        <span id="playerScore">0</span>
        <span>:</span>
        <span id="cpuScore">0</span>
      </div>
    </section>

    <canvas id="game" width="900" height="520" aria-label="Pong game area"></canvas>
    <section class="menu-overlay" id="menuOverlay" aria-label="Start menu">
      <div class="menu-card">
        <p class="menu-kicker">Arcade Ready</p>
        <h2 class="menu-title">Pong</h2>
        <p class="menu-copy">Pick a difficulty, hit play, and hold the rally as the ball keeps accelerating with every return.</p>
        <div class="menu-controls">
          <p class="menu-label">Difficulty</p>
          <select class="difficulty-select" id="difficultySelect" aria-label="Select difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
          <p class="menu-label">Game Point</p>
          <select class="target-select" id="targetSelect" aria-label="Select winning score">
            <option value="1">Game of 1</option>
            <option value="3" selected>Game of 3</option>
            <option value="5">Game of 5</option>
          </select>
          <button class="play-button" id="playButton" type="button">Play</button>
          <p class="difficulty-note" id="difficultyNote"></p>
        </div>
      </div>
    </section>
    <p class="footer">First to keep up wins. The rally gets faster every return.</p>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const playerScoreEl = document.getElementById("playerScore");
    const cpuScoreEl = document.getElementById("cpuScore");
    const menuOverlay = document.getElementById("menuOverlay");
    const difficultySelect = document.getElementById("difficultySelect");
    const targetSelect = document.getElementById("targetSelect");
    const difficultyNote = document.getElementById("difficultyNote");
    const playButton = document.getElementById("playButton");

    const config = {
      paddleWidth: 14,
      paddleHeight: 110,
      paddleSpeed: 520,
      ballSize: 14,
      ballSpeedStep: 28,
      maxBallSpeedBase: 860,
      serveDelay: 700
    };

    const difficulties = {
      easy: {
        label: "Easy",
        ballBaseSpeed: 285,
        aiSpeed: 320,
        note: "Slower serves and a forgiving opponent."
      },
      medium: {
        label: "Medium",
        ballBaseSpeed: 340,
        aiSpeed: 430,
        note: "Balanced pace with sharper AI tracking."
      },
      hard: {
        label: "Hard",
        ballBaseSpeed: 410,
        aiSpeed: 545,
        note: "Fast serves and a much tougher paddle to beat."
      }
    };

    const state = {
      playerScore: 0,
      cpuScore: 0,
      upPressed: false,
      downPressed: false,
      lastFrame: 0,
      serveTimer: config.serveDelay,
      gameStarted: false,
      gameOver: false,
      difficulty: "medium",
      winningScore: 3,
      ballBaseSpeed: difficulties.medium.ballBaseSpeed,
      aiSpeed: difficulties.medium.aiSpeed,
      maxBallSpeed: config.maxBallSpeedBase + 120
    };

    const player = {
      x: 28,
      y: canvas.height / 2 - config.paddleHeight / 2,
      width: config.paddleWidth,
      height: config.paddleHeight
    };

    const cpu = {
      x: canvas.width - config.paddleWidth - 28,
      y: canvas.height / 2 - config.paddleHeight / 2,
      width: config.paddleWidth,
      height: config.paddleHeight
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: config.ballSize,
      vx: 0,
      vy: 0,
      speed: difficulties.medium.ballBaseSpeed
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyDifficulty(level) {
      const difficulty = difficulties[level];
      state.difficulty = level;
      state.ballBaseSpeed = difficulty.ballBaseSpeed;
      state.aiSpeed = difficulty.aiSpeed;
      state.maxBallSpeed = config.maxBallSpeedBase + Math.round(difficulty.ballBaseSpeed * 0.7);
      difficultyNote.textContent = `${difficulty.note} Playing first to ${state.winningScore}.`;
    }

    function applyWinningScore(value) {
      state.winningScore = Number(value);
      const difficulty = difficulties[state.difficulty];
      difficultyNote.textContent = `${difficulty.note} Playing first to ${state.winningScore}.`;
    }

    function centerPaddles() {
      player.y = canvas.height / 2 - player.height / 2;
      cpu.y = canvas.height / 2 - cpu.height / 2;
    }

    function resetBall(direction = Math.random() > 0.5 ? 1 : -1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = state.ballBaseSpeed;

      const launchAngle = (Math.random() * 0.9 - 0.45);
      ball.vx = Math.cos(launchAngle) * ball.speed * direction;
      ball.vy = Math.sin(launchAngle) * ball.speed;
      state.serveTimer = config.serveDelay;
    }

    function scorePoint(side) {
      if (side === "player") {
        state.playerScore += 1;
      } else {
        state.cpuScore += 1;
      }

      playerScoreEl.textContent = state.playerScore;
      cpuScoreEl.textContent = state.cpuScore;

      if (state.playerScore >= state.winningScore || state.cpuScore >= state.winningScore) {
        state.gameStarted = false;
        state.gameOver = true;
        playButton.textContent = state.playerScore > state.cpuScore ? "Play Again" : "Rematch";
        menuOverlay.classList.remove("hidden");
        return;
      }

      resetBall(side === "player" ? -1 : 1);
    }

    function movePlayer(dt) {
      let direction = 0;
      if (state.upPressed) direction -= 1;
      if (state.downPressed) direction += 1;

      player.y += direction * config.paddleSpeed * dt;
      player.y = clamp(player.y, 0, canvas.height - player.height);
    }

    function moveCpu(dt) {
      const targetY = ball.y - cpu.height / 2;
      const diff = targetY - cpu.y;
      const direction = Math.sign(diff);
      const trackingFactor = clamp(Math.abs(diff) / 90, 0.2, 1);

      cpu.y += direction * state.aiSpeed * trackingFactor * dt;
      cpu.y = clamp(cpu.y, 0, canvas.height - cpu.height);
    }

    function reflectFromPaddle(paddle, isPlayer) {
      const relativeIntersectY = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
      const bounceAngle = relativeIntersectY * 1.1;
      ball.speed = Math.min(ball.speed + config.ballSpeedStep, state.maxBallSpeed);

      const xDirection = isPlayer ? 1 : -1;
      ball.vx = Math.cos(bounceAngle) * ball.speed * xDirection;
      ball.vy = Math.sin(bounceAngle) * ball.speed;

      ball.x = isPlayer
        ? paddle.x + paddle.width + ball.size / 2
        : paddle.x - ball.size / 2;
    }

    function updateBall(dt) {
      if (!state.gameStarted) {
        return;
      }

      if (state.serveTimer > 0) {
        state.serveTimer -= dt * 1000;
        return;
      }

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.y - ball.size / 2 <= 0) {
        ball.y = ball.size / 2;
        ball.vy *= -1;
      }

      if (ball.y + ball.size / 2 >= canvas.height) {
        ball.y = canvas.height - ball.size / 2;
        ball.vy *= -1;
      }

      const hitsPlayer =
        ball.x - ball.size / 2 <= player.x + player.width &&
        ball.y + ball.size / 2 >= player.y &&
        ball.y - ball.size / 2 <= player.y + player.height &&
        ball.vx < 0;

      const hitsCpu =
        ball.x + ball.size / 2 >= cpu.x &&
        ball.y + ball.size / 2 >= cpu.y &&
        ball.y - ball.size / 2 <= cpu.y + cpu.height &&
        ball.vx > 0;

      if (hitsPlayer) {
        reflectFromPaddle(player, true);
      } else if (hitsCpu) {
        reflectFromPaddle(cpu, false);
      }

      if (ball.x < -ball.size) {
        scorePoint("cpu");
      } else if (ball.x > canvas.width + ball.size) {
        scorePoint("player");
      }
    }

    function drawCenterLine() {
      ctx.save();
      ctx.setLineDash([10, 16]);
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 18);
      ctx.lineTo(canvas.width / 2, canvas.height - 18);
      ctx.stroke();
      ctx.restore();
    }

    function drawPaddle(paddle, color) {
      ctx.fillStyle = color;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }

    function drawBall() {
      ctx.fillStyle = "#f8fbff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawOverlay() {
      if (!state.gameStarted) return;
      if (state.serveTimer <= 0) return;

      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.font = '700 26px "Trebuchet MS", sans-serif';
      ctx.textAlign = "center";
      ctx.fillText("Serve incoming", canvas.width / 2, 48);
      ctx.font = '400 16px "Trebuchet MS", sans-serif';
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText("Track the ball and stay in the rally", canvas.width / 2, 74);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawCenterLine();
      drawPaddle(player, "#6ee7f9");
      drawPaddle(cpu, "#ff8a5b");
      drawBall();
      drawOverlay();
    }

    function loop(timestamp) {
      if (!state.lastFrame) state.lastFrame = timestamp;
      const dt = Math.min((timestamp - state.lastFrame) / 1000, 0.018);
      state.lastFrame = timestamp;

      movePlayer(dt);
      if (state.gameStarted) {
        moveCpu(dt);
      }
      updateBall(dt);
      render();

      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowUp" || event.key.toLowerCase() === "w") {
        state.upPressed = true;
      }
      if (event.key === "ArrowDown" || event.key.toLowerCase() === "s") {
        state.downPressed = true;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.key === "ArrowUp" || event.key.toLowerCase() === "w") {
        state.upPressed = false;
      }
      if (event.key === "ArrowDown" || event.key.toLowerCase() === "s") {
        state.downPressed = false;
      }
    });

    canvas.addEventListener("mousemove", (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      const pointerY = (event.clientY - rect.top) * scaleY;
      player.y = clamp(pointerY - player.height / 2, 0, canvas.height - player.height);
    });

    difficultySelect.addEventListener("change", (event) => {
      applyDifficulty(event.target.value);
    });

    targetSelect.addEventListener("change", (event) => {
      applyWinningScore(event.target.value);
    });

    playButton.addEventListener("click", () => {
      state.playerScore = 0;
      state.cpuScore = 0;
      playerScoreEl.textContent = "0";
      cpuScoreEl.textContent = "0";
      centerPaddles();
      applyDifficulty(difficultySelect.value);
      applyWinningScore(targetSelect.value);
      state.gameStarted = true;
      state.gameOver = false;
      playButton.textContent = "Play";
      menuOverlay.classList.add("hidden");
      resetBall(Math.random() > 0.5 ? 1 : -1);
    });

    applyDifficulty(difficultySelect.value);
    applyWinningScore(targetSelect.value);
    centerPaddles();
    resetBall(Math.random() > 0.5 ? 1 : -1);
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
